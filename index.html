// ====== GAME LOGIC ======
var count = 0, locked = false;

function clickIt(){
  if(locked) return;
  count++;
  var card=document.getElementById("card"),icon=document.getElementById("icon"),
      msg=document.getElementById("msg"),btn=document.getElementById("btn"),
      pill=document.getElementById("pill"),dots=document.querySelectorAll(".dot");
  if(dots[count-1]) dots[count-1].classList.add("ok");
  if(count<=cfg.total){msg.style.animation="none";msg.offsetHeight;msg.style.animation="fadeSlideIn .45s cubic-bezier(.34,1.56,.64,1)";msg.textContent=cfg.msgs[count-1];}
  var si=Math.min(Math.floor((count-1)/cfg.total*cfg.icons.length),cfg.icons.length-1);
  icon.textContent=cfg.icons[si];
  card.classList.add("shake");setTimeout(function(){card.classList.remove("shake")},500);
  pill.textContent=cfg.pillPre+count+cfg.pillMid+(100-Math.round(count/cfg.total*100))+cfg.pillSuf;
  btn.textContent=cfg.btns[Math.min(count-1,cfg.btns.length-1)];
  spawnFX();
  if(count%3===0){msg.classList.add("wiggle");setTimeout(function(){msg.classList.remove("wiggle")},350);}
  if(count>=cfg.total){
    locked=true;icon.textContent=cfg.lastIcon;msg.textContent=cfg.msgs[cfg.total-1];
    btn.textContent=cfg.lastBtn;pill.textContent=cfg.lastPill;
    card.style.animation="none";card.classList.remove("shake");btn.onclick=showFinal;
  }
}

function spawnFX(){
  var s=cfg.sparks,el=document.createElement("span");el.className="fx";
  el.textContent=s[Math.floor(Math.random()*s.length)];
  el.style.left=(10+Math.random()*80)+"%";el.style.top=(15+Math.random()*55)+"%";
  el.style.setProperty("--rot",(Math.random()-0.5)*50+"deg");document.body.appendChild(el);
  setTimeout(function(){el.remove()},1300);
}

function showFinal(){
  document.body.innerHTML='<div class="bg"></div><div class="parts"></div><div class="fin-overlay"><div class="fin-msg"><span class="fin-emoji">'+cfg.finEmoji+'</span><div class="fin-title">'+cfg.finTitle+'</div><div class="fin-sub">'+cfg.finSub1+'<br>'+cfg.finSub2+'<br><br><strong>'+cfg.finSub3+'</strong></div><button class="fin-btn" onclick="trulyExit()">'+cfg.finBtn+'</button></div></div>';
}

function trulyExit(){
  document.body.style.transition="opacity .8s ease";document.body.style.opacity="0";
  setTimeout(function(){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:'+cfg.exitBg+';color:'+cfg.exitColor+';font-size:14px;text-align:center;padding:20px;font-family:\'PingFang SC\',\'Microsoft YaHei\',sans-serif;">'+cfg.exitMsg+'</div>';document.body.style.opacity="1"},800);
}
